<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수석의방 AI 스케줄러</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    @media print {
      @page { margin: 1cm; size: A4 portrait; }
      body { background: white; }
      .print-hidden { display: none !important; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
    .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
  </style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 h-screen flex flex-col overflow-hidden selection:bg-indigo-100">

  <header class="bg-white border-b border-gray-200 py-3 px-4 sm:px-6 flex justify-between items-center shrink-0 z-20 print-hidden">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded-full overflow-hidden border border-indigo-100 shadow-sm">
         <img src="https://res.cloudinary.com/dms5vyofw/image/upload/v1766382489/%E1%84%80%E1%85%B5%E1%86%B7%E1%84%89%E1%85%AE%E1%84%89%E1%85%A5%E1%86%A8%E1%84%8B%E1%85%A1%E1%84%8B%E1%85%B5%E1%84%8F%E1%85%A9%E1%86%AB_%E1%84%85%E1%85%A1%E1%84%8B%E1%85%B5%E1%86%AB_%E1%84%8F%E1%85%A5%E1%86%AF%E1%84%85%E1%85%A51_snx7la.png" alt="Logo" class="w-full h-full object-cover" crossorigin="anonymous">
      </div>
      <h1 class="text-lg sm:text-xl font-black text-indigo-900 tracking-tight">수석의방 AI 스케줄러</h1>
    </div>
    <div id="progress-steps" class="hidden sm:flex gap-2"></div>
  </header>

  <main class="flex-1 flex flex-col md:flex-row h-full overflow-hidden">
    
    <section class="w-full md:w-2/5 lg:w-1/3 flex flex-col h-[50vh] md:h-full bg-indigo-50/30 border-r border-gray-200 shrink-0 print-hidden">
      <div id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar"></div>
      
      <div id="loading-indicator" class="hidden flex justify-start px-4 pb-4">
        <div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 mr-2 mt-1">
          <img src="https://res.cloudinary.com/dms5vyofw/image/upload/v1766382489/%E1%84%80%E1%85%B5%E1%86%B7%E1%84%89%E1%85%AE%E1%84%89%E1%85%A5%E1%86%A8%E1%84%8B%E1%85%A1%E1%84%8B%E1%85%B5%E1%84%8F%E1%85%A9%E1%86%AB_%E1%84%85%E1%85%A1%E1%84%8B%E1%85%B5%E1%86%AB_%E1%84%8F%E1%85%A5%E1%86%AF%E1%84%85%E1%85%A51_snx7la.png" class="w-full h-full object-cover opacity-50">
        </div>
        <div class="bg-white p-3.5 rounded-2xl rounded-tl-sm border border-gray-100 shadow-sm flex items-center gap-2 text-gray-500 text-sm">
          <i data-lucide="loader-2" class="animate-spin text-indigo-500 w-4 h-4"></i> 김수석 멘토 입력중...
        </div>
      </div>

      <div class="p-4 bg-white border-t border-gray-200 shrink-0 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)]">
        <div class="flex gap-2 items-end">
          <textarea id="chat-input" placeholder="답변을 입력해주세요..." rows="1"
            class="flex-1 max-h-32 p-3 rounded-xl bg-gray-100 border-transparent focus:bg-white focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100 resize-none transition-all outline-none"></textarea>
          <button id="send-btn" class="bg-indigo-600 text-white p-3 rounded-xl hover:bg-indigo-700 disabled:bg-gray-300 transition-colors shadow-md flex-shrink-0 h-[48px] w-[48px] flex justify-center items-center">
            <i data-lucide="arrow-right"></i>
          </button>
        </div>
      </div>
    </section>

    <section class="flex-1 bg-gray-100 p-4 sm:p-6 overflow-y-auto h-[50vh] md:h-full custom-scrollbar print:p-0 print:bg-white print:overflow-visible relative" id="right-section">
      <div class="max-w-3xl mx-auto space-y-6 print:space-y-4">
        
        <div id="download-banner" class="hidden justify-between items-center bg-indigo-50 border border-indigo-100 p-4 rounded-xl print-hidden">
          <div class="flex items-center gap-2 text-indigo-800 font-bold">
            <i data-lucide="sparkles" class="text-yellow-500"></i> 스케줄표가 완성되었습니다!
          </div>
          <button id="download-btn" class="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2 rounded-lg font-bold shadow-md hover:bg-indigo-700">
            <i data-lucide="file-text" id="dl-icon"></i> <span id="dl-text">PDF로 저장</span>
          </button>
        </div>

        <div id="print-area" class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 print:shadow-none print:border-none print:p-0 transition-all duration-0">
          
          <div class="text-center mb-6 border-b pb-4">
             <h1 class="text-2xl font-black text-indigo-900 mb-1">MY STUDY SCHEDULE</h1>
             <p class="text-gray-500 italic text-sm">"꿈을 현실로 만드는 시작"</p>
          </div>

          <div id="subjects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 mb-6 print:grid-cols-3"></div>

          <div id="empty-state" class="h-64 flex flex-col items-center justify-center text-gray-400 opacity-50 print-hidden">
            <i data-lucide="calendar" class="w-16 h-16 mb-4"></i>
            <p class="text-lg font-medium">김수석 멘토와 대화를 나누면</p>
            <p>여기에 스케줄표가 그려집니다.</p>
          </div>

          <div id="schedule-wrapper" class="hidden h-[600px] print:h-auto">
             </div>

          <div id="footer-branding" class="hidden text-center mt-8 text-gray-400 text-xs font-medium tracking-widest">
            Created with 수석의방
          </div>
        </div>

      </div>
    </section>
  </main>

  <script>
    // --- Configuration ---
    const WORKER_URL = "https://myschedule.kimsoosuk1.workers.dev/";
    const KIM_SOOSUK_IMAGE_URL = "https://res.cloudinary.com/dms5vyofw/image/upload/v1766382489/%E1%84%80%E1%85%B5%E1%86%B7%E1%84%89%E1%85%AE%E1%84%89%E1%85%A5%E1%86%A8%E1%84%8B%E1%85%A1%E1%84%8B%E1%85%B5%E1%84%8F%E1%85%A9%E1%86%AB_%E1%84%85%E1%85%A1%E1%84%8B%E1%85%B5%E1%86%AB_%E1%84%8F%E1%85%A5%E1%86%AF%E1%84%85%E1%85%A51_snx7la.png";
    const WEEK_DAYS = ['월', '화', '수', '목', '금', '토', '일'];
    const START_HOUR = 8;
    const TOTAL_SLOTS = 32;

    // --- State ---
    let state = {
      messages: [{ role: 'ai', text: '안녕! 나는 너의 공부 스케줄을 짜줄 김수석 멘토야. 혼자 스케줄 짜기 막막했지? 나랑 대화하면서 하나씩 완성해보자. \n\n가장 먼저, 성적표를 받았을 때 저절로 미소가 지어질 기분 좋은 **과목과 목표 점수**를 1의 자리까지 정확하게 말해줄래? (예: 수학 94점)' }],
      isLoading: false,
      isPrinting: false,
      appData: { phase: 'step1', subjects: [], fixedSchedule: [], studySchedule: [] }
    };

    // --- DOM Elements ---
    const chatContainer = document.getElementById('chat-container');
    const chatInput = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const loadingIndicator = document.getElementById('loading-indicator');
    const progressSteps = document.getElementById('progress-steps');
    const subjectsContainer = document.getElementById('subjects-container');
    const emptyState = document.getElementById('empty-state');
    const scheduleWrapper = document.getElementById('schedule-wrapper');
    const footerBranding = document.getElementById('footer-branding');
    const downloadBanner = document.getElementById('download-banner');
    const downloadBtn = document.getElementById('download-btn');
    const printArea = document.getElementById('print-area');

    // --- Helpers ---
    const parseTime = (timeStr) => {
      if (!timeStr) return 0;
      const [h, m] = timeStr.split(':').map(Number);
      return h * 60 + m;
    };

    const getDurationMin = (startStr, endStr) => {
      const startMin = parseTime(startStr);
      let endMin = parseTime(endStr);
      if (endMin === 0 && startMin > 0) endMin = 24 * 60;
      return endMin - startMin;
    };

    const formatDisplayTime = (timeStr) => timeStr ? timeStr.replace(/^0/, '') : '';

    const formatMessageText = (text) => text.replace(/\*\*(.*?)\*\*/g, '<strong class="font-bold">$1</strong>');

    // --- Render Functions ---
    function renderChat() {
      chatContainer.innerHTML = state.messages.map(msg => `
        <div class="flex ${msg.role === 'ai' ? 'justify-start' : 'justify-end'}">
          ${msg.role === 'ai' ? `
            <div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 mr-2 mt-1 shadow-sm border border-white">
              <img src="${KIM_SOOSUK_IMAGE_URL}" class="w-full h-full object-cover">
            </div>
          ` : ''}
          <div class="max-w-[85%] p-3.5 rounded-2xl text-sm leading-relaxed shadow-sm break-words whitespace-pre-wrap ${
            msg.role === 'ai' ? 'bg-white text-gray-800 rounded-tl-sm border border-gray-100' : 'bg-indigo-600 text-white rounded-tr-sm'
          }">${formatMessageText(msg.text)}</div>
        </div>
      `).join('');
      setTimeout(() => {
        chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
      }, 50);
    }

    function renderProgress() {
      const phaseProgress = { 'step1': 1, 'step2': 2, 'step3': 3, 'step4_hours': 4, 'step4_fixed': 4, 'step4_study': 4, 'step5': 5 };
      const current = phaseProgress[state.appData.phase] || 1;
      
      progressSteps.innerHTML = [1, 2, 3, 4, 5].map(num => `
        <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold transition-all
          ${current === num ? 'bg-indigo-600 text-white shadow-md ring-2 ring-indigo-200' : 
            current > num ? 'bg-indigo-100 text-indigo-600' : 'bg-gray-100 text-gray-400'}">
          ${current > num ? '<i data-lucide="check-circle" class="w-3 h-3"></i>' : num}
        </div>
      `).join('');
      lucide.createIcons();
    }

    function renderSubjects() {
      if (state.appData.subjects.length > 0) {
        subjectsContainer.innerHTML = state.appData.subjects.map(sub => `
          <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200">
            <div class="flex justify-between items-center mb-2">
              <h3 class="font-bold text-indigo-900 text-lg">${sub.name || '미정'}</h3>
              ${sub.targetScore ? `<span class="text-sm text-indigo-700 font-bold">목표 ${sub.targetScore}점</span>` : ''}
            </div>
            ${sub.gapDetail ? `<div class="text-xs text-red-500 font-medium mb-2 break-keep">📝 ${sub.gapDetail}</div>` : ''}
            ${sub.plan ? `<div class="text-xs text-gray-600 bg-gray-50 p-2 rounded-lg break-keep leading-relaxed">${sub.plan}</div>` : ''}
          </div>
        `).join('');
        emptyState.classList.add('hidden');
        footerBranding.classList.remove('hidden');
      } else {
        subjectsContainer.innerHTML = '';
        emptyState.classList.remove('hidden');
        footerBranding.classList.add('hidden');
      }
    }

    function renderSchedule() {
      const { fixedSchedule, studySchedule, phase, subjects } = state.appData;
      
      if (fixedSchedule.length === 0 && studySchedule.length === 0 && !phase.includes('step4')) {
        scheduleWrapper.classList.add('hidden');
        return;
      }
      
      scheduleWrapper.classList.remove('hidden');
      
      // 베이스 그리드 생성
      let gridHtml = `
        <div class="flex flex-col h-full bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden print:shadow-none print:border-none">
          <div class="grid grid-cols-8 border-b bg-gray-50 z-10 sticky top-0">
            <div class="p-2 text-center text-xs font-bold text-gray-500 border-r">시간</div>
            ${WEEK_DAYS.map(d => `<div class="p-2 text-center text-xs font-bold text-gray-700 border-r last:border-0">${d}</div>`).join('')}
          </div>
          <div class="relative custom-scrollbar bg-white ${state.isPrinting ? 'h-auto overflow-visible' : 'flex-1 overflow-y-auto'}" id="grid-body">
      `;

      for (let i = 0; i < TOTAL_SLOTS; i++) {
        gridHtml += `
          <div class="grid grid-cols-8 h-[20px] border-b border-gray-50 box-border">
            <div class="text-[9px] text-gray-400 text-center leading-[20px] border-r bg-gray-50/30">
              ${i % 2 === 0 ? `${START_HOUR + i/2}:00` : ''}
            </div>
            ${WEEK_DAYS.map(() => `<div class="border-r border-gray-50 last:border-0"></div>`).join('')}
          </div>
        `;
      }

      // 블록 스타일 계산 로직
      const getItemStyle = (start, end) => {
        const startMin = parseTime(start);
        const durationMin = getDurationMin(start, end);
        const startSlot = (startMin - START_HOUR * 60) / 30;
        const slotsSpan = Math.max(durationMin / 30, 1);
        return `top: ${startSlot * 20}px; height: ${slotsSpan * 20}px;`;
      };

      // 블록 렌더링
      WEEK_DAYS.forEach((day, dayIdx) => {
        let blocksHtml = '';
        
        fixedSchedule.filter(item => item.day === day).forEach(item => {
          const duration = getDurationMin(item.start, item.end);
          const isShort = duration <= 30;
          const showTime = duration >= 120;
          blocksHtml += `
            <div style="${getItemStyle(item.start, item.end)}" 
                 class="absolute w-[92%] left-[4%] rounded-md overflow-hidden flex border bg-gray-600 text-white border-gray-700 shadow-sm z-10 leading-tight ${isShort ? 'flex-row items-center px-1' : 'flex-col justify-start p-1'}">
              <div class="font-bold text-[9px] sm:text-[10px] ${isShort ? 'truncate w-full' : 'break-keep'}">${item.title}</div>
              ${showTime ? `<div class="text-[8px] sm:text-[8.5px] opacity-90 mt-0.5 whitespace-normal">${formatDisplayTime(item.start)} - ${formatDisplayTime(item.end)}</div>` : ''}
            </div>
          `;
        });

        studySchedule.filter(item => item.day === day).forEach(item => {
          const sub = subjects.find(s => s.id === item.subjectId);
          const duration = getDurationMin(item.start, item.end);
          const isShort = duration <= 30;
          const showTime = duration >= 120;
          blocksHtml += `
            <div style="${getItemStyle(item.start, item.end)}" 
                 class="absolute w-[92%] left-[4%] rounded-md overflow-hidden flex border bg-indigo-500 text-white border-indigo-600 shadow-sm z-20 leading-tight ${isShort ? 'flex-row items-center px-1' : 'flex-col justify-start p-1'}">
              <div class="font-bold text-[9px] sm:text-[10px] ${isShort ? 'truncate w-full' : 'break-keep'}">${sub?.name || '공부'}</div>
              ${showTime ? `<div class="text-[8px] sm:text-[8.5px] opacity-90 mt-0.5 whitespace-normal">${formatDisplayTime(item.start)} - ${formatDisplayTime(item.end)}</div>` : ''}
            </div>
          `;
        });

        gridHtml += `<div class="absolute top-0 bottom-0 pointer-events-none" style="left: ${(dayIdx + 1) * 12.5}%; width: 12.5%;">${blocksHtml}</div>`;
      });

      gridHtml += `</div></div>`;
      scheduleWrapper.innerHTML = gridHtml;
    }

    function updateUI() {
      renderChat();
      renderProgress();
      renderSubjects();
      renderSchedule();
      
      if(state.appData.phase === 'step5') {
        downloadBanner.classList.remove('hidden');
        downloadBanner.classList.add('flex');
      }
      
      if(state.isLoading) {
        loadingIndicator.classList.remove('hidden');
        sendBtn.disabled = true;
        chatInput.disabled = true;
      } else {
        loadingIndicator.classList.add('hidden');
        sendBtn.disabled = false;
        chatInput.disabled = false;
        chatInput.focus();
      }
    }

    // --- Actions ---
    async function handleSend() {
      const text = chatInput.value.trim();
      if (!text || state.isLoading) return;

      state.messages.push({ role: 'user', text });
      state.isLoading = true;
      chatInput.value = '';
      updateUI();

      // Inject hidden prompt for schedule data extraction
      const payloadMessages = [...state.messages];
      const lastMessage = payloadMessages[payloadMessages.length - 1];
      payloadMessages[payloadMessages.length - 1] = {
        ...lastMessage,
        text: lastMessage.text + "\\n\\n[SYSTEM INSTRUCTION: 대화의 맥락에 따라 스케줄 데이터가 업데이트 되어야 한다면, 당신의 응답 마지막에 반드시 ```json\\n { \\\"phase\\\": \\\"현재단계(step1~step5)\\\", \\\"subjects\\\": [{\\\"id\\\":\\\"과목id\\\",\\\"name\\\":\\\"과목명\\\",\\\"targetScore\\\":90,\\\"gapDetail\\\":\\\"...\\\",\\\"plan\\\":\\\"...\\\"}], \\\"fixedSchedule\\\": [{\\\"id\\\":\\\"...\\\",\\\"day\\\":\\\"월~일\\\",\\\"start\\\":\\\"HH:MM\\\",\\\"end\\\":\\\"HH:MM\\\",\\\"title\\\":\\\"...\\\"}], \\\"studySchedule\\\": [{\\\"id\\\":\\\"...\\\",\\\"day\\\":\\\"월~일\\\",\\\"start\\\":\\\"HH:MM\\\",\\\"end\\\":\\\"HH:MM\\\",\\\"subjectId\\\":\\\"과목id\\\"}] } \\n``` 형태의 JSON 블록을 포함해서 출력하세요. 스케줄이 변경되지 않았다면 JSON 블록은 생략해도 됩니다. JSON 블록 외의 앞부분에는 학생에게 할 자연스러운 멘토의 답변을 작성하세요.]"
      };

      try {
        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: payloadMessages, currentData: state.appData })
        });
        
        if (!response.ok) throw new Error('Network error');
        
        const data = await response.json();
        
        let replyText = data.reply || '';
        let newData = null;
        
        // Extract JSON from reply text
        const jsonMatch = replyText.match(/```json\\n?([\\s\\S]*?)\\n?```/);
        if (jsonMatch) {
          try {
            newData = JSON.parse(jsonMatch[1].trim());
            // Remove the JSON block from the reply text
            replyText = replyText.replace(/```json\\n?[\\s\\S]*?\\n?```/, '').trim();
          } catch(e) {
            console.error("JSON parsing error", e);
          }
        }
        
        state.messages.push({ role: 'ai', text: replyText });
        
        let newPhase = data.phase || state.appData.phase;
        let newSubjects = data.subjects || state.appData.subjects || [];
        let newFixed = data.fixedSchedule || state.appData.fixedSchedule || [];
        let newStudy = data.studySchedule || state.appData.studySchedule || [];
        
        if (newData) {
          if (newData.phase) newPhase = newData.phase;
          if (newData.subjects) newSubjects = newData.subjects;
          if (newData.fixedSchedule) newFixed = newData.fixedSchedule;
          if (newData.studySchedule) newStudy = newData.studySchedule;
        }

        state.appData = {
          phase: newPhase,
          subjects: newSubjects,
          fixedSchedule: newFixed,
          studySchedule: newStudy
        };
      } catch (error) {
        console.error(error);
        state.messages.push({ role: 'ai', text: '미안해, 잠시 생각하느라 연결이 끊겼어. 다시 한 번 말해줄래?' });
      } finally {
        state.isLoading = false;
        updateUI();
      }
    }

    async function handleDownloadPDF() {
      if(state.isPrinting) return;
      
      state.isPrinting = true;
      
      // UI 강제 업데이트 (스크롤 영역 풀기)
      scheduleWrapper.classList.remove('h-[600px]');
      scheduleWrapper.classList.add('h-auto');
      renderSchedule(); // 높이 auto 반영을 위해 재렌더링
      
      document.getElementById('dl-icon').setAttribute('data-lucide', 'loader-2');
      document.getElementById('dl-icon').classList.add('animate-spin');
      document.getElementById('dl-text').innerText = '저장 중...';
      lucide.createIcons();

      // DOM 업데이트 대기
      setTimeout(async () => {
        try {
          const element = printArea;
          const canvas = await html2canvas(element, { 
            scale: 2, 
            backgroundColor: '#ffffff', 
            useCORS: true,
            windowWidth: element.scrollWidth,
            windowHeight: element.scrollHeight,
            scrollY: 0,
            scrollX: 0
          });

          const imgData = canvas.toDataURL('image/jpeg', 1.0);
          const pdfWidth = 210; 
          const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
          
          const { jsPDF } = window.jspdf;
          const pdf = new jsPDF('p', 'mm', [pdfWidth, pdfHeight]);
          pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
          pdf.save('나만의_스케줄표.pdf');

        } catch (err) {
          console.error(err);
          alert("PDF 저장 중 오류가 발생했어. 인쇄 기능을 대신 실행할게.");
          window.print();
        } finally {
          state.isPrinting = false;
          scheduleWrapper.classList.add('h-[600px]');
          scheduleWrapper.classList.remove('h-auto');
          renderSchedule(); // 원상복구
          
          document.getElementById('dl-icon').setAttribute('data-lucide', 'file-text');
          document.getElementById('dl-icon').classList.remove('animate-spin');
          document.getElementById('dl-text').innerText = 'PDF로 저장';
          lucide.createIcons();
        }
      }, 500);
    }

    // --- Event Listeners ---
    sendBtn.addEventListener('click', handleSend);
    chatInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (e.isComposing) return;
        handleSend();
      }
    });
    downloadBtn.addEventListener('click', handleDownloadPDF);

    // Initial render
    lucide.createIcons();
    updateUI();
  </script>
</body>
</html>
